# Jarvis — Production Compose Stack (3-Microservice Tier).
#
# Flexible stack supporting both CDN-backed public deployments and
# 100% offline self-hosted 3-container setups.
#
# Usage:
#   1. Copy template:  cp .env.prod.example .env.prod
#   2. Edit variables: nano .env.prod
#   3. Run container:  docker compose --env-file .env.prod -f docker-compose.prod.yml up -d
#

services:
  # --- 1. LLM: Dedicated Pre-Baked Inference Engine Container ---
  llama:
    image: ${LLAMA_IMAGE:-ghcr.io/ravijangid820/jarvis-llama:latest}
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # --- 2. Orchestrator: Pure Python API + RAG + Auth + TTS ---
  orchestrator:
    image: ${ORCH_IMAGE:-ghcr.io/ravijangid820/jarvis-orchestrator:latest}
    depends_on:
      llama:
        condition: service_healthy
    environment:
      - JARVIS_FAST_BRAIN_URL=${JARVIS_FAST_BRAIN_URL:-http://llama:8081/v1/chat/completions}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:5000}
      - EMBED_MODEL=${EMBED_MODEL:-google/embeddinggemma-300m}
      - HA_URL=${HA_URL:-}
      - HA_TOKEN=${HA_TOKEN:-}
      - HA_ALLOWED_ENTITIES=${HA_ALLOWED_ENTITIES:-}
      - ADMIN_USER=${ADMIN_USER:-admin}
      - ADMIN_PASS=${ADMIN_PASS:-admin}
      - HOST_PORT=${HOST_PORT:-5000}
    ports:
      - "${HOST_PORT:-5000}:5000"
    volumes:
      - ${CONFIG_DIR:-./config}:/app/config
      - ${TLS_DIR:-./tls}:/app/tls:ro
      - jarvis-prod-data:/app/memory
    restart: unless-stopped

  # --- 3. Frontend: Optional Nginx Web Server (For 100% offline self-hosting) ---
  # Enable if you want a local Nginx web server instead of CDN (GitHub/Cloudflare Pages)
  # frontend:
  #   image: ${FRONTEND_IMAGE:-ghcr.io/ravijangid820/jarvis-frontend:latest}
  #   ports:
  #     - "${FRONTEND_PORT:-80}:80"
  #   depends_on:
  #     - orchestrator
  #   restart: unless-stopped

volumes:
  jarvis-prod-data:
