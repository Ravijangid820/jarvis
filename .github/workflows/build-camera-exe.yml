name: build-camera-exe

# Builds the Windows camera .exe REPRODUCIBLY from source on a GitHub-hosted Windows runner, so the
# binary is traceable to a commit (not a binary handed over out-of-band). Publishes the .exe + its
# SHA-256 as a downloadable artifact; on a `camera-v*` tag a separate, write-scoped job attaches them
# to a Release.
on:
  workflow_dispatch:                 # run manually from the Actions tab
  push:
    tags: ['camera-v*']

permissions:
  contents: read                     # default: read-only (the build job needs nothing more)

jobs:
  build:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: camera
    steps:
      # NB: actions are pinned to major tags for readability; pin to full commit SHAs for stricter
      # supply-chain (a moved tag would otherwise run with this job's token — here that's read-only).
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5

      - name: Build the .exe (PyInstaller, in an isolated venv)
        run: |
          uv venv --python 3.12
          uv pip install --python .venv\Scripts\python.exe -r requirements-desktop.txt pyinstaller
          .venv\Scripts\pyinstaller.exe --onefile --noconfirm --name jarvis-camera `
            --paths . --collect-all cv2 --add-data "config.example.json;." run_exe.py

      - name: Checksum
        run: (Get-FileHash dist\jarvis-camera.exe -Algorithm SHA256).Hash | Out-File -Encoding ascii dist\jarvis-camera.exe.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: jarvis-camera-windows
          path: |
            camera/dist/jarvis-camera.exe
            camera/dist/jarvis-camera.exe.sha256

  # Only this job can write to the repo, and only on a tag — least privilege.
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: jarvis-camera-windows
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            jarvis-camera.exe
            jarvis-camera.exe.sha256
