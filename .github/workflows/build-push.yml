name: Build & push images (GHCR)

# Optimized CI/CD Workflow:
# Uses path-filtering and GitHub Actions Docker layer caching (type=gha)
# so container images are ONLY rebuilt when their relevant source files change,
# and unchanged Docker build layers are reused instantly in ~5 seconds.

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag for a manual/TEST build (e.g. 2.4.0-rc1). Manual builds never move :latest — only releases (v* tag pushes) do."
        required: true
        default: "test"
  push:
    branches: ["production-setup"]
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  # ---- Detect changed paths to skip unnecessary container builds ----
  changes:
    runs-on: ubuntu-latest
    outputs:
      combined: ${{ steps.filter.outputs.combined }}
      orchestrator: ${{ steps.filter.outputs.orchestrator }}
      llama: ${{ steps.filter.outputs.llama }}
      frontend: ${{ steps.filter.outputs.frontend }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            combined:
              - 'Dockerfile.combined'
              - 'src/**'
              - 'config/**'
              - 'pyproject.toml'
              - 'uv.lock'
            orchestrator:
              - 'Dockerfile.orchestrator'
              - 'src/**'
              - 'config/**'
              - 'pyproject.toml'
              - 'uv.lock'
              - 'docker/**'
            llama:
              - 'Dockerfile.llama'
              - 'models/**'
            frontend:
              - 'Dockerfile.frontend'
              - 'frontend/**'
              - 'docker/nginx.conf'

  # ---- jarvis-combined: single self-contained container ----
  build-combined:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.combined == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android \
                      /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift || true
          sudo apt-get clean || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/jarvis-combined"
          if [ "${{ github.event_name }}" = "push" ]; then
            ver="${GITHUB_REF_NAME#v}"
            echo "tags=${image}:${ver},${image}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push jarvis-combined
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.combined
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            LLM_GGUF_URL=https://huggingface.co/unsloth/Qwen3.5-2B-GGUF/resolve/main/Qwen3.5-2B-Q4_K_M.gguf
            LLM_GGUF_SHA256=aaf42c8b7c3cab2bf3d69c355048d4a0ee9973d48f16c731c0520ee914699223

      - run: echo "Pushed ${{ steps.meta.outputs.tags }}  (single-container all-in-one)" >> "$GITHUB_STEP_SUMMARY"

  # ---- jarvis-orchestrator: pure backend API image ----
  build-orchestrator:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.orchestrator == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android \
                      /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift || true
          sudo apt-get clean || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/jarvis-orchestrator"
          if [ "${{ github.event_name }}" = "push" ]; then
            ver="${GITHUB_REF_NAME#v}"
            echo "tags=${image}:${ver},${image}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push jarvis-orchestrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.orchestrator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - run: echo "Pushed ${{ steps.meta.outputs.tags }}  (pure backend API orchestrator)" >> "$GITHUB_STEP_SUMMARY"

  # ---- jarvis-llama: pre-baked LLM inference engine image ----
  build-llama:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.llama == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android \
                      /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift || true
          sudo apt-get clean || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/jarvis-llama"
          if [ "${{ github.event_name }}" = "push" ]; then
            ver="${GITHUB_REF_NAME#v}"
            echo "tags=${image}:${ver},${image}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push jarvis-llama (pre-baked LLM)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.llama
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            LLM_GGUF_URL=https://huggingface.co/unsloth/Qwen3.5-2B-GGUF/resolve/main/Qwen3.5-2B-Q4_K_M.gguf
            LLM_GGUF_SHA256=aaf42c8b7c3cab2bf3d69c355048d4a0ee9973d48f16c731c0520ee914699223

      - run: echo "Pushed ${{ steps.meta.outputs.tags }}  (pre-baked LLM inference engine)" >> "$GITHUB_STEP_SUMMARY"

  # ---- jarvis-frontend: standalone Nginx container image ----
  build-frontend:
    needs: changes
    if: ${{ github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v') || needs.changes.outputs.frontend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/jarvis-frontend"
          if [ "${{ github.event_name }}" = "push" ]; then
            ver="${GITHUB_REF_NAME#v}"
            echo "tags=${image}:${ver},${image}:latest" >> "$GITHUB_OUTPUT"
          else
            echo "tags=${image}:${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build & push jarvis-frontend (Nginx container)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - run: echo "Pushed ${{ steps.meta.outputs.tags }}  (standalone Nginx web server)" >> "$GITHUB_STEP_SUMMARY"
