name: Build & push images (GHCR)

# Builds Jarvis' images on GitHub's runners (fast network — no big upload from your laptop) and pushes
# them to GitHub Container Registry. We do NOT compile llama.cpp: the combined image is built ON the
# official ghcr.io/ggml-org/llama.cpp:server image. Two images are published:
#   • jarvis-combined     — self-contained single container (official llama + orchestrator + models)
#   • jarvis-orchestrator — slim app only (for the two-service split; pairs with the official llama image)
# Trigger manually (Actions → Run workflow) or by pushing a v* tag → image X.Y.Z + latest.
#
# No secrets required: the LLM GGUF and the torch-free ONNX embedding bundle are both public,
# pinned + SHA-256-verified downloads (see docs/setup/docker.md).

on:
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag for a manual build (e.g. 2.2.0). Tag pushes derive this automatically."
        required: true
        default: "latest"
  push:
    tags: ["v*"]

permissions:
  contents: read
  packages: write

jobs:
  # ---- jarvis-combined: single self-contained container, built ON the official llama image ----
  build-combined:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          # baked LLM + ONNX embedding bundle need ~10-15 GB during the build; a runner has ~14 GB free.
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android \
                      /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift || true
          sudo apt-get clean || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/jarvis-combined"
          if [ "${{ github.event_name }}" = "push" ]; then ver="${GITHUB_REF_NAME#v}"; else ver="${{ inputs.tag }}"; fi
          if [ "${ver}" = "latest" ]; then echo "tags=${image}:latest" >> "$GITHUB_OUTPUT";
          else echo "tags=${image}:${ver},${image}:latest" >> "$GITHUB_OUTPUT"; fi

      - name: Build & push jarvis-combined
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.combined
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            LLM_GGUF_URL=https://huggingface.co/unsloth/Qwen3.5-2B-GGUF/resolve/main/Qwen3.5-2B-Q4_K_M.gguf
            LLM_GGUF_SHA256=aaf42c8b7c3cab2bf3d69c355048d4a0ee9973d48f16c731c0520ee914699223

      - run: echo "Pushed ${{ steps.meta.outputs.tags }}  (single-container all-in-one)" >> "$GITHUB_STEP_SUMMARY"

  # ---- jarvis-orchestrator: slim app image for the two-service split ----
  build-orchestrator:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Free up disk space
        run: |
          sudo rm -rf /usr/share/dotnet /opt/ghc /usr/local/.ghcup /usr/local/lib/android \
                      /opt/hostedtoolcache /usr/local/share/boost /usr/share/swift || true
          sudo apt-get clean || true
          df -h /

      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: meta
        run: |
          owner="$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')"
          image="ghcr.io/${owner}/jarvis-orchestrator"
          if [ "${{ github.event_name }}" = "push" ]; then ver="${GITHUB_REF_NAME#v}"; else ver="${{ inputs.tag }}"; fi
          if [ "${ver}" = "latest" ]; then echo "tags=${image}:latest" >> "$GITHUB_OUTPUT";
          else echo "tags=${image}:${ver},${image}:latest" >> "$GITHUB_OUTPUT"; fi

      - name: Build & push jarvis-orchestrator (slim, no LLM)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.orchestrator
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}

      - run: echo "Pushed ${{ steps.meta.outputs.tags }}  (slim orchestrator — needs a llama backend)" >> "$GITHUB_STEP_SUMMARY"
