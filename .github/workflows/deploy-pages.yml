# Deploy the React frontend to GitHub Pages.
#
# The static SPA is built with Vite and deployed to:
#   https://ravi-mk42.me/jarvis/   (custom domain via Ravijangid820.github.io CNAME)
#
# The backend (orchestrator + LLM) runs separately on Proxmox. Set VITE_API_URL
# at build time to point the frontend at the backend's public URL (once exposed).
# Without it, the UI loads but shows "backend offline" — fine for showcasing the UI.

name: Deploy frontend to GitHub Pages

on:
  push:
    branches: [main, production-setup, github-pages-deploy]
    paths:
      - 'frontend/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:      # manual trigger from Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Build for GitHub Pages
        working-directory: frontend
        env:
          VITE_BASE_PATH: /jarvis/
          # Uncomment and set when the backend is publicly reachable:
          # VITE_API_URL: https://api.ravi-mk42.me
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: frontend/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
