# Jarvis — server stack (two services). The LLM is the OFFICIAL, upstream-maintained llama.cpp server
# image (no from-source compile to own); the ONLY image we build is the orchestrator. A new llama.cpp
# release is a one-line bump of LLAMA_IMAGE. The camera/volume agents and voice listener run natively.
#
#   bash src/scripts/download_models.sh              # put a GGUF in ./models first
#   docker compose pull && docker compose up -d      # pull published orchestrator + official llama
#   (no HuggingFace token needed — the embedding ships as a pinned, torch-free ONNX bundle)
#   # …or build the orchestrator locally:  docker compose up -d --build
#   # override anything on the CLI, e.g.:  ADMIN_PASS=secret docker compose up -d
#
# Want ONE self-contained container instead (e.g. Proxmox OCI)? Use the jarvis-combined image — see
# docs/setup/docker.md.

services:
  # --- LLM: the OFFICIAL llama.cpp server (all-CPU-variant, runs on AVX/AVX2/AVX-512). For production,
  #     pin LLAMA_IMAGE to a specific tag (e.g. ghcr.io/ggml-org/llama.cpp:server-b<NNNN>). ---
  llama:
    image: ${LLAMA_IMAGE:-ghcr.io/ggml-org/llama.cpp:server}
    command: >
      -m /models/${LLM_MODEL:-Qwen3.5-2B-Q4_K_M.gguf}
      -c ${LLM_CTX:-4096}
      -t ${LLAMA_THREADS:-4}
      --host 0.0.0.0 --port 8081 --parallel 1
    volumes:
      - ./models:/models:ro       # put the GGUF here (src/scripts/download_models.sh, or your own)
    healthcheck:                  # the official image ships curl; gate the orchestrator on this
      test: ["CMD", "curl", "-fsS", "http://localhost:8081/health"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  # --- Orchestrator: the only image we build (FastAPI + UI + embeddings + TTS, no LLM). Talks to the
  #     llama service at http://llama:8081 (config/jarvis.docker.json). ---
  orchestrator:
    image: ${ORCH_IMAGE:-ghcr.io/ravijangid820/jarvis-orchestrator:latest}
    build:
      context: .
      dockerfile: Dockerfile.orchestrator
    depends_on:
      llama:
        condition: service_healthy   # don't start until the LLM answers /health
    # No .env required — every value has a default. Override on the CLI, in an optional .env, or here.
    environment:
      - EMBED_MODEL=${EMBED_MODEL:-google/embeddinggemma-300m}   # custom model? mount a matching ONNX bundle
      - ADMIN_USER=${ADMIN_USER:-admin}    # default admin/admin — change ADMIN_PASS for anything exposed
      - ADMIN_PASS=${ADMIN_PASS:-admin}
      - HOST_PORT=${HOST_PORT:-5000}       # shown in the startup banner
    ports:
      - "${HOST_PORT:-5000}:5000"
    volumes:
      - ./config:/app/config              # jarvis.json (created from the docker template on first run)
      - ./tls:/app/tls:ro                 # optional: drop server.crt + server.key here for HTTPS
      - jarvis-data:/app/memory           # SQLite DB + ChromaDB vectors (persisted)
    restart: unless-stopped

volumes:
  jarvis-data:
