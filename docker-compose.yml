# Jarvis — server stack. ONE image (built from the Dockerfile: orchestrator + a from-source
# llama.cpp) run as TWO services. The camera agent, volume agent, and voice listener run natively
# on the devices that have the camera/mic/speaker — they are NOT part of this compose.
# See docs/setup/docker.md.
#
# Quick start:
#   cp .env.example .env        # fill in HF_TOKEN, ADMIN_USER/PASS (optionally LLAMA_CPP_REF, GGML_AVX2)
#   # place the GGUF at ./models/qwen3.5_2b/Qwen3.5-2B-Q4_K_M.gguf
#   docker compose up -d --build

services:
  # The LLM server — same image, started as llama-server (overrides the orchestrator entrypoint).
  llama:
    image: jarvis-server:local
    build: &jarvis-build
      context: .
      args:
        LLAMA_CPP_REF: ${LLAMA_CPP_REF:-}
        GGML_AVX2: ${GGML_AVX2:-ON}
        # Baked at build time: if ./models has no .gguf, the model is downloaded from here + verified.
        LLM_GGUF_URL: ${LLM_GGUF_URL:-}
        LLM_GGUF_SHA256: ${LLM_GGUF_SHA256:-}
        # Which GGUF to bake if ./models holds several (matched by filename; else first found).
        DEFAULT_MODEL: ${DEFAULT_MODEL:-Qwen3.5-2B-Q4_K_M.gguf}
    # The wrapper ensures the model is present (fetch + verify on first run if missing), then runs
    # llama-server. Model + context come from .env, so swapping models is a one-line change.
    entrypoint: ["/app/docker/llama-entry.sh"]
    command: ["-c", "${LLM_CTX:-4096}", "-t", "${LLAMA_THREADS:-4}",
              "--host", "0.0.0.0", "--port", "8081", "--parallel", "1"]
    environment:
      # Blank LLM_MODEL = use the model baked into the image. Set it to override with your own.
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_GGUF_URL=${LLM_GGUF_URL:-}
      - LLM_GGUF_SHA256=${LLM_GGUF_SHA256:-}
      # Any extra llama-server flags, e.g. "--top-k 40 --repeat-penalty 1.1 --mlock".
      - LLAMA_EXTRA_ARGS=${LLAMA_EXTRA_ARGS:-}
    volumes:
      - ./models:/app/models      # your own models (rw); the baked default lives separately at /opt
    restart: unless-stopped

  # The orchestrator — same image, default entrypoint (bootstrap + uvicorn). Serves HTTP on :5000.
  orchestrator:
    image: jarvis-server:local
    build: *jarvis-build
    depends_on:
      - llama
    env_file: .env
    environment:
      - HOST_PORT=${HOST_PORT:-5000}     # shown in the startup banner
    ports:
      - "${HOST_PORT:-5000}:5000"
    volumes:
      - ./config:/app/config              # jarvis.json (created from the docker template on first run)
      - ./models:/app/models:ro           # GGUF + any local model assets
      - ./tls:/app/tls:ro                 # optional: drop server.crt + server.key here for HTTPS (setup_tls.sh)
      - jarvis-data:/app/memory           # SQLite DB + ChromaDB vectors (persisted)
      - hf-cache:/app/.cache/huggingface  # embedding model cache (downloaded on first run)
    restart: unless-stopped

volumes:
  jarvis-data:
  hf-cache:
