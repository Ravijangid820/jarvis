<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS &middot; Admin HUD</title>
  <link rel="stylesheet" href="/static/style.css">
  <link rel="icon"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🛡️</text></svg>">
  <style>
    body {
      padding: 40px;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: var(--font-sans);
      text-transform: uppercase;
      overflow: auto !important;
      height: auto !important;
      min-height: 100vh;
    }

    .hud-container {
      max-width: 1000px;
      margin: 0 auto;
    }

    h1 {
      font-family: var(--font-mono);
      color: var(--accent-cyan);
      margin-bottom: 30px;
      border-bottom: 2px solid var(--accent-cyan);
      padding-bottom: 10px;
      display: inline-block;
      box-shadow: 0 4px 6px -6px var(--accent-cyan);
    }

    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-bottom: 30px;
    }

    .stat-box {
      background: var(--bg-surface);
      border: 1px solid var(--accent-gold);
      padding: 20px;
      text-align: center;
      border-radius: var(--radius-sm);
      box-shadow: inset 0 0 15px rgba(251, 191, 36, 0.1);
    }

    .stat-value {
      font-size: 2.5rem;
      font-family: var(--font-mono);
      color: var(--accent-gold);
      font-weight: 700;
      text-shadow: var(--shadow-gold);
    }

    .stat-label {
      font-size: 0.85rem;
      color: var(--text-secondary);
      letter-spacing: 0.1em;
    }

    .panel {
      background: var(--bg-surface);
      border: 1px solid var(--border-glass);
      border-radius: var(--radius-sm);
      padding: 20px;
      margin-bottom: 30px;
      position: relative;
    }

    .panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent-red);
      box-shadow: var(--shadow-glow);
    }

    .panel h2 {
      font-size: 1.2rem;
      color: var(--accent-red);
      margin-bottom: 15px;
      border-bottom: 1px solid var(--border-glass);
      padding-bottom: 10px;
      font-family: var(--font-mono);
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 10px;
      font-size: 0.9rem;
    }

    th,
    td {
      text-align: left;
      padding: 12px;
      border-bottom: 1px solid var(--border-glass);
    }

    th {
      color: var(--accent-cyan);
      font-family: var(--font-mono);
      letter-spacing: 0.05em;
    }

    td {
      color: var(--text-primary);
    }

    .btn {
      padding: 8px 16px;
      background: transparent;
      border: 1px solid var(--accent-gold);
      color: var(--accent-gold);
      font-family: var(--font-mono);
      font-weight: 700;
      cursor: pointer;
      transition: all var(--transition-fast);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .btn:hover {
      background: var(--accent-gold-dim);
      box-shadow: var(--shadow-gold);
    }

    .btn-danger {
      color: var(--text-muted);
      border-color: var(--text-muted);
    }

    .btn-danger:hover {
      background: rgba(220, 38, 38, 0.15);
      color: var(--accent-red);
      border-color: var(--accent-red);
      box-shadow: var(--shadow-glow);
    }

    input[type="text"],
    input[type="password"] {
      padding: 10px;
      background: var(--bg-input);
      border: 1px solid var(--border-glass);
      color: var(--accent-gold);
      font-family: var(--font-mono);
      margin-right: 10px;
      width: 200px;
      outline: none;
    }

    input:focus {
      border-color: var(--accent-gold);
      box-shadow: var(--shadow-gold);
    }

    .top-btn {
      position: absolute;
      top: 40px;
      right: 40px;
    }
  </style>
</head>

<body>
  <div class="hud-container">
    <button class="btn top-btn" onclick="window.location.href='/'">Return to Console</button>
    <h1>J.A.R.V.I.S Command Center</h1>

    <div class="stats-grid">
      <div class="stat-box">
        <div class="stat-value" id="stat-users">--</div>
        <div class="stat-label">Authorized Users</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="stat-chats">--</div>
        <div class="stat-label">Active Sessions</div>
      </div>
      <div class="stat-box">
        <div class="stat-value" id="stat-messages">--</div>
        <div class="stat-label">Total Exchanges</div>
      </div>
    </div>

    <div class="panel">
      <h2>User Registry</h2>
      <div style="margin-bottom: 20px; display: flex; gap: 10px;">
        <input type="text" id="new-user-name" placeholder="USERNAME" autocomplete="off">
        <input type="password" id="new-user-pass" placeholder="PASSWORD" autocomplete="new-password">
        <button class="btn" onclick="createUser()">Authorize User</button>
      </div>
      <table>
        <thead>
          <tr>
            <th>UID</th>
            <th>Username</th>
            <th>Clearance</th>
            <th>Sessions</th>
            <th>Msgs</th>
            <th>Established</th>
            <th>Override</th>
          </tr>
        </thead>
        <tbody id="users-body"></tbody>
      </table>
    </div>

    <!-- User Details Modal -->
    <div id="user-modal"
      style="display:none; position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:999; justify-content:center; align-items:center;">
      <div
        style="background:var(--bg-surface); border:1px solid var(--accent-cyan); padding:30px; width:400px; box-shadow:0 0 20px rgba(6, 182, 212, 0.3);">
        <h2 style="color:var(--accent-cyan); margin-bottom:15px; font-family:var(--font-mono);">User Diagnostics</h2>
        <div id="modal-content"
          style="color:var(--text-primary); font-size:1.1rem; line-height:1.6; font-family:var(--font-mono);"></div>
        <button class="btn" style="width:100%; margin-top:20px;"
          onclick="document.getElementById('user-modal').style.display='none'">Close</button>
      </div>
    </div>

    <div class="panel">
      <h2>Machine Integration Keys</h2>
      <div style="margin-bottom: 20px; display: flex; gap: 10px;">
        <input type="text" id="new-key-user" placeholder="TARGET UID" style="width: 120px;">
        <input type="text" id="new-key-desc" placeholder="DESIGNATION (e.g. Home Assistant)" style="width: 300px;">
        <button class="btn" onclick="createKey()">Generate Uplink</button>
      </div>
      <div id="new-key-display"
        style="display:none; background:rgba(6, 182, 212, 0.1); border:1px solid var(--accent-cyan); padding:15px; margin-bottom:20px; color:var(--accent-cyan); font-family:var(--font-mono); font-size:1.1rem; box-shadow: 0 0 10px rgba(6, 182, 212, 0.2);">
      </div>
      <table>
        <thead>
          <tr>
            <th>Uplink Token</th>
            <th>Target UID</th>
            <th>Designation</th>
            <th>Requests</th>
            <th>Last Ping</th>
            <th>Established</th>
            <th>Override</th>
          </tr>
        </thead>
        <tbody id="keys-body"></tbody>
      </table>
    </div>
  </div>

  <script>
    const API_BASE = window.location.origin;
    const token = localStorage.getItem("jarvis_token");
    if (!token) window.location.href = "/";

    async function apiCall(endpoint, method = "GET", body = null) {
      const opts = { method, headers: { "Authorization": "Bearer " + token } };
      if (body) { opts.headers["Content-Type"] = "application/json"; opts.body = JSON.stringify(body); }
      const resp = await fetch(API_BASE + endpoint, opts);
      if (!resp.ok) {
        if (resp.status === 401 || resp.status === 403) { alert("Clearance denied."); window.location.href = "/"; }
        throw new Error(await resp.text());
      }
      return await resp.json();
    }

    async function loadStats() {
      try {
        const data = await apiCall("/admin/stats");
        document.getElementById("stat-users").textContent = data.users;
        document.getElementById("stat-chats").textContent = data.chats;
        document.getElementById("stat-messages").textContent = data.messages;
      } catch (e) { console.error("Stats Error:", e); }
    }

    // Escape user-controlled values before interpolating into innerHTML — usernames and
    // key descriptions are attacker-influenced and would otherwise allow stored XSS.
    function esc(v) {
      return String(v == null ? "" : v)
        .replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;").replaceAll("'", "&#39;");
    }

    async function loadUsers() {
      try {
        const data = await apiCall("/admin/users");
        const tbody = document.getElementById("users-body");
        tbody.innerHTML = "";
        data.users.forEach(u => {
          const tr = document.createElement("tr");
          tr.style.cursor = "pointer";
          tr.onclick = (e) => {
            if (e.target.tagName === 'BUTTON') return;
            showUserModal(u);
          };
          tr.innerHTML = `<td>00${esc(u.id)}</td><td style="color:var(--accent-gold); font-weight:bold;">${esc(u.username)}</td><td>${esc(u.role)}</td>
                          <td style="color:var(--accent-cyan);">${esc(u.total_chats)}</td><td style="color:var(--accent-cyan);">${esc(u.total_messages)}</td>
                          <td>${esc(u.created_at)}</td>
                          <td><button class="btn btn-danger" onclick="deleteUser(${Number(u.id)})">Terminate</button></td>`;
          tbody.appendChild(tr);
        });
      } catch (e) { console.error(e); }
    }

    function showUserModal(u) {
      const content = `
        <div style="display:flex; justify-content:space-between;"><span>UID:</span> <span>00${esc(u.id)}</span></div>
        <div style="display:flex; justify-content:space-between;"><span>Alias:</span> <span style="color:var(--accent-gold);">${esc(u.username)}</span></div>
        <div style="display:flex; justify-content:space-between;"><span>Clearance:</span> <span>${esc(u.role)}</span></div>
        <div style="display:flex; justify-content:space-between;"><span>Active Sessions:</span> <span style="color:var(--accent-cyan);">${esc(u.total_chats)}</span></div>
        <div style="display:flex; justify-content:space-between;"><span>Total Messages:</span> <span style="color:var(--accent-cyan);">${esc(u.total_messages)}</span></div>
        <div style="display:flex; justify-content:space-between;"><span>Established:</span> <span>${esc(u.created_at)}</span></div>
      `;
      document.getElementById('modal-content').innerHTML = content;
      document.getElementById('user-modal').style.display = 'flex';
    }

    async function createUser() {
      const u = document.getElementById("new-user-name").value;
      const p = document.getElementById("new-user-pass").value;
      if (!u || !p) return alert("Credentials required.");
      try {
        await apiCall("/admin/users", "POST", { username: u, password: p, role: "user" });
        document.getElementById("new-user-name").value = "";
        document.getElementById("new-user-pass").value = "";
        loadUsers(); loadStats();
      } catch (e) { alert("Authorization Failed: " + e.message); }
    }

    async function deleteUser(id) {
      if (!confirm("Terminate user protocol? All data will be purged.")) return;
      try { await apiCall(`/admin/users/${id}`, "DELETE"); loadUsers(); loadStats(); }
      catch (e) { alert("Termination Failed: " + e.message); }
    }

    async function loadKeys() {
      try {
        const data = await apiCall("/admin/api_keys");
        const tbody = document.getElementById("keys-body");
        tbody.innerHTML = "";
        data.keys.forEach(k => {
          const tr = document.createElement("tr");
          tr.innerHTML = `<td><code>${esc(k.key_string)}</code></td><td>00${esc(k.user_id)}</td><td>${esc(k.description)}</td>
                          <td style="color:var(--accent-cyan); font-weight:bold;">${esc(k.usage_count || 0)}</td>
                          <td style="color:var(--text-secondary);">${esc(k.last_used_at || 'Never')}</td>
                          <td>${esc(k.created_at)}</td>
                          <td><button class="btn btn-danger" onclick="deleteKey('${esc(k.full_key)}')">Sever</button></td>`;
          tbody.appendChild(tr);
        });
      } catch (e) { console.error(e); }
    }

    async function deleteKey(keyString) {
      if (!confirm("Sever uplink? External scripts will lose connection instantly.")) return;
      try { await apiCall(`/admin/api_keys/${keyString}`, "DELETE"); loadKeys(); }
      catch (e) { alert("Failed: " + e.message); }
    }

    async function createKey() {
      const uid = parseInt(document.getElementById("new-key-user").value);
      const desc = document.getElementById("new-key-desc").value;
      if (!uid || !desc) return alert("Parameters missing.");
      try {
        const data = await apiCall("/admin/api_keys", "POST", { user_id: uid, description: desc });
        document.getElementById("new-key-user").value = "";
        document.getElementById("new-key-desc").value = "";
        const disp = document.getElementById("new-key-display");
        disp.textContent = "[UPLINK ESTABLISHED] SECURE TOKEN: " + data.key;
        disp.style.display = "block";
        loadKeys();
      } catch (e) { alert("Failed: " + e.message); }
    }

    function init() {
      loadStats();
      loadUsers();
      loadKeys();
    }
    init();
  </script>
</body>

</html>
